# Requirements:
# 1. clone tmux package manager: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# 2. clone this file to ~/.config/.tmux.conf
# 3. tmux source ~/.config/.tmux.conf
# 4. install all the packages inside tmux (prefix + I to install)

# True color + italics support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -as terminal-features ",*:hyperlinks"

# Minimal escape time for snappy Vim mode switching
set -sg escape-time 1

# Change prefix to Ctrl + Space (ergonomic & easy to reach)
unbind C-b
set-option -g prefix C-Space
bind C-Space send-prefix

# We can split the window horizontally with <prefix>-'|'
unbind %
bind | split-window -h -c "#{pane_current_path}"

# We can split the window vertically with <prefix>-'-'
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# We can reload the tmux configuration with <prefix>-r
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# We can resize panes by holding VIM bindings: j, k, l, h
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Maximize the tmux pane
bind -r m resize-pane -Z

# Workspace layout: N columns, each with 75/25 top/bottom split
# Prompts for number of columns with <prefix>-W
# prefix + G: create N new columns (75/25 split each)
bind G command-prompt -p "columns:" "run-shell '~/.config/tmux/workspace.sh %%'"
# prefix + E: rearrange existing panes into 75/25 columns
bind E run-shell '~/.config/tmux/workspace-reflow.sh'
# prefix + S: create N even columns (no top/bottom split)
bind S command-prompt -p "columns:" "run-shell '~/.config/tmux/workspace-columns.sh %%'"

# Enable resizing with mouse, just for convenience sometimes
set -g mouse on

# Allow terminal (wezterm) to handle mouse events for links
set -g allow-passthrough on

# Enable vim selection mode
# Enter tmux copy mode: <prefix>-'['
# Go out of copy mode: ctrl-c
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
unbind -T copy-mode-vi MouseDragEnd1Pane

# Initialize tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Add a plugin for tmux navigator (vim)
# Allows to navigate through the windows with control-<j,k,l,h>
set -g @plugin 'christoomey/vim-tmux-navigator'

# Persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Automatically save sessions every 15 minutes & restore on start
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# ── Appearance (Catppuccin) ─────────────────────────────────
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor "mocha"

# Pane borders (handled by catppuccin)
set -g pane-border-lines single
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#{@thm_lavender}] #{pane_index}: #{pane_current_command} #[fg=#{@thm_overlay_0}]#{b:pane_current_path} ,#[fg=#{@thm_surface_1}] #{pane_index} }"

# Initialize the tmux plugin manager (needs to be at the bottom of the file!)
run '~/.tmux/plugins/tpm/tpm'

# Status bar (must be after tpm so catppuccin variables are available)
set -g status-left ""
set -g @catppuccin_session_icon ""
set -g status-right "#{E:@catppuccin_status_session}"
