# Requirements:
# 1. clone tmux package manager: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# 2. clone this file to ~/.config/.tmux.conf
# 3. tmux source ~/.config/.tmux.conf
# 4. install all the packages inside tmux (prefix + I to install)

# We need to make sure that full color palette is supported
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Reset escape time, bug realted to tmux+Vim
set -sg escape-time 10

# Forward focus events to nvim so :checktime fires when external tools (like
# Claude Code) edit files - this is what makes nvim auto-reload buffers
set -g focus-events on

# Change prefix to Ctrl + Space (ergonomic & easy to reach)
unbind C-b
set-option -g prefix C-Space
bind C-Space send-prefix

# We can split the window horizontally with <prefix>-'|' (keeps current dir)
unbind %
bind | split-window -h -c "#{pane_current_path}"

# We can split the window vertically with <prefix>-'-' (keeps current dir)
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# New windows also inherit the current directory
bind c new-window -c "#{pane_current_path}"

# We can reload the tmux configuration with <prefix>-r
unbind r
bind r source-file ~/.config/tmux/.tmux.conf

# We can resize panes by holding VIM bindings: j, k, l, h
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Maximize the tmux pane
bind -r m resize-pane -Z

# Enable resizing with mouse, just for convenience sometimes
set -g mouse on

# Enable vim selection mode
# Enter tmux copy mode: <prefix>-'['
# Go out of copy mode: ctrl-c
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# Initialize tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Add a plugin for tmux navigator (vim)
# Allows to navigate through the windows with control-<j,k,l,h>
set -g @plugin 'christoomey/vim-tmux-navigator'

# Persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Automatically save sessions every 15 minutes
set -g @plugin 'tmux-plugins/tmux-continuum' 

# Status bar
set -g status-style 'bg=#111111,fg=#666666'
set -g status-left '#[fg=#888888] #S '
set -g status-right '#[fg=#555555]%H:%M '
set -g status-left-length 20
set -g window-status-format '#[fg=#444444] #I:#W '
set -g window-status-current-format '#[fg=#cccccc] #I:#W '
set -g pane-border-style 'fg=#222222'
set -g pane-active-border-style 'fg=#444444'
set -g message-style 'bg=#111111,fg=#cccccc'

# Initialize the tmux plugin manager (needs to be at the bottom of the file!)
run '~/.tmux/plugins/tpm/tpm'
